<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1600 620" role="img" aria-label="GUI Model Integration Guide"><defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 12 6 L 0 12 z" fill="#5a7388"/></marker></defs><rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/><text x="800.0" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#10263f">GUI Model Integration Guide</text><text x="800.0" y="60" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b6075">From checkpoint validation to a GUI inference smoke test.</text><rect x="70" y="92" width="1460" height="460" rx="22" ry="22" fill="#f8fbff" stroke="#a9bfd4" stroke-width="2"/><text x="94" y="126" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#10263f">Integration workflow</text><rect x="110" y="250" width="165" height="90" rx="16" ry="16" fill="#f6ecd7" stroke="#5b7a99" stroke-width="2"/><text x="192.5" y="284.8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#10263f"><tspan x="192.5" dy="0.0">Train or obtain</tspan><tspan x="192.5" dy="20.4">a checkpoint</tspan></text><rect x="300" y="250" width="175" height="90" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="387.5" y="284.8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#10263f"><tspan x="387.5" dy="0.0">Validate the</tspan><tspan x="387.5" dy="20.4">checkpoint or bundle</tspan></text><rect x="490" y="250" width="175" height="90" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="577.5" y="284.8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#10263f"><tspan x="577.5" dy="0.0">Register the model</tspan><tspan x="577.5" dy="20.4">in the frozen registry</tspan></text><rect x="680" y="250" width="165" height="90" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="762.5" y="284.8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#10263f"><tspan x="762.5" dy="0.0">Expose the model in</tspan><tspan x="762.5" dy="20.4">GUI metadata</tspan></text><rect x="870" y="250" width="175" height="90" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="957.5" y="284.8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#10263f"><tspan x="957.5" dy="0.0">Confirm the backend loader</tspan><tspan x="957.5" dy="20.4">can resolve it</tspan></text><rect x="1060" y="250" width="165" height="90" rx="16" ry="16" fill="#eaf6ea" stroke="#5b7a99" stroke-width="2"/><text x="1142.5" y="284.8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#10263f"><tspan x="1142.5" dy="0.0">Run a GUI inference</tspan><tspan x="1142.5" dy="20.4">smoke test</tspan></text><rect x="1250" y="250" width="165" height="90" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="1332.5" y="284.8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#10263f"><tspan x="1332.5" dy="0.0">Inspect output and</tspan><tspan x="1332.5" dy="20.4">document the run</tspan></text><line x1="275" y1="295" x2="300" y2="295" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="465" y1="295" x2="490" y2="295" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="655" y1="295" x2="680" y2="295" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="835" y1="295" x2="870" y2="295" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="1025" y1="295" x2="1060" y2="295" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="1215" y1="295" x2="1250" y2="295" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><rect x="635" y="380" width="330" height="58" rx="16" ry="16" fill="#ffffff" stroke="#d8dfe8" stroke-width="2"/><text x="800.0" y="409.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#10263f"><tspan x="800.0" dy="0.0">The GUI label is for users; the model ID is for runtime.</tspan></text></svg>