3f"><tspan x="640.0" dy="0.0">Desktop</tspan><tspan x="640.0" dy="19.2">workflow</tspan></text><rect x="810" y="1340" width="160" height="72" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="890.0" y="1366.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#10263f"><tspan x="890.0" dy="0.0">Segmentation</tspan><tspan x="890.0" dy="19.2">pipeline</tspan></text><rect x="1060" y="1340" width="160" height="72" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="1140.0" y="1376.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#10263f"><tspan x="1140.0" dy="0.0">Predictor</tspan></text><rect x="1260" y="1340" width="160" height="72" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="1340.0" y="1376.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#10263f"><tspan x="1340.0" dy="0.0">Analyzer</tspan></text><rect x="1450" y="1340" width="160" height="72" rx="16" ry="16" fill="#eaf6ea" stroke="#5b7a99" stroke-width="2"/><text x="1530.0" y="1366.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#10263f"><tspan x="1530.0" dy="0.0">Export</tspan><tspan x="1530.0" dy="19.2">artifact</tspan></text><line x1="280" y1="1376" x2="310" y2="1376" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="500" y1="1376" x2="560" y2="1376" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="750" y1="1376" x2="810" y2="1376" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="1000" y1="1376" x2="1060" y2="1376" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="1200" y1="1376" x2="1260" y2="1376" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="1400" y1="1376" x2="1450" y2="1376" stroke="#5a7388" stroke-width="3