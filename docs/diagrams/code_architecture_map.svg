.0" dy="0.0">Segmentation core</tspan><tspan x="980.0" dy="19.2">src/microseg</tspan></text><rect x="1190" y="250" width="290" height="64" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="1335.0" y="272.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#10263f"><tspan x="1335.0" dy="0.0">Data lifecycle</tspan><tspan x="1335.0" dy="19.2">prep + dataops</tspan></text><rect x="110" y="370" width="290" height="64" rx="16" ry="16" fill="#eaf6ea" stroke="#5b7a99" stroke-width="2"/><text x="255.0" y="392.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#10263f"><tspan x="255.0" dy="0.0">Configs + artifacts</tspan><tspan x="255.0" dy="19.2">configs, outputs, registry</tspan></text><rect x="460" y="370" width="290" height="64" rx="16" ry="16" fill="#f7efd8" stroke="#5b7a99" stroke-width="2"/><text x="605.0" y="392.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#10263f"><tspan x="605.0" dy="0.0">Training backends</tspan><tspan x="605.0" dy="19.2">unet / pixel / HF / SMP</tspan></text><rect x="820" y="370" width="290" height="64" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="965.0" y="392.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#10263f"><tspan x="965.0" dy="0.0">Governance + deployment</tspan><tspan x="965.0" dy="19.2">quality + deployment</tspan></text><rect x="1180" y="370" width="320" height="64" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="1340.0" y="392.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#10263f"><tspan x="1340.0" dy="0.0">Compatibility layer</tspan><tspan x="1340.0" dy="19.2">legacy adapters</tspan></text><line x1="360" y1="282" x2="420" y2="282" stroke="#5a7388" stroke-width="3" mark