<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1600 760" role="img" aria-label="Air-Gapped Model Handoff"><defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 12 6 L 0 12 z" fill="#5a7388"/></marker></defs><rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/><text x="800.0" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#10263f">Air-Gapped Model Handoff</text><text x="800.0" y="60" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b6075">Package on a connected machine, transfer by media, then validate locally on the isolated GUI PC.</text><rect x="60" y="92" width="1480" height="620" rx="22" ry="22" fill="#f8fbff" stroke="#a9bfd4" stroke-width="2"/><text x="84" y="126" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#10263f">Four-stage handoff</text><rect x="110" y="170" width="300" height="430" rx="22" ry="22" fill="#f6ecd7" stroke="#b28b3e" stroke-width="2"/><text x="260.0" y="204" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#10263f">Connected training PC</text><rect x="445" y="170" width="300" height="430" rx="22" ry="22" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="595.0" y="204" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#10263f">Transfer media</text><rect x="780" y="170" width="300" height="430" rx="22" ry="22" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="930.0" y="204" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#10263f">Air-gapped GUI PC</text><rect x="1115" y="170" width="330" height="430" rx="22" ry="22" fill="#eaf6ea" stroke="#5d8d5d" stroke-width="2"/><text x="1280.0" y="204" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#10263f">Desktop inference</text><rect x="135" y="235" width="250" height="68" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="260.0" y="269.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="600" fill="#10263f"><tspan x="260.0" dy="0.0">best_checkpoint.pth</tspan></text><rect x="135" y="325" width="250" height="68" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="260.0" y="359.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#10263f"><tspan x="260.0" dy="0.0">training_manifest.json</tspan></text><rect x="135" y="415" width="250" height="68" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="260.0" y="438.8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#10263f"><tspan x="260.0" dy="0.0">report.json</tspan><tspan x="260.0" dy="20.4">class map</tspan></text><rect x="135" y="505" width="250" height="68" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="260.0" y="539.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#10263f"><tspan x="260.0" dy="0.0">SHA256 checksum</tspan></text><rect x="470" y="235" width="230" height="68" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="585.0" y="258.2" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#10263f"><tspan x="585.0" dy="0.0">USB drive</tspan><tspan x="585.0" dy="21.6">or offline share</tspan></text><rect x="470" y="325" width="230" height="68" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="585.0" y="347.6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="600" fill="#10263f"><tspan x="585.0" dy="0.0">No internet</tspan><tspan x="585.0" dy="22.8">required</tspan></text><rect x="470" y="415" width="230" height="68" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="585.0" y="438.2" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#10263f"><tspan x="585.0" dy="0.0">Copy once,</tspan><tspan x="585.0" dy="21.6">verify once</tspan></text><rect x="470" y="505" width="230" height="68" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="585.0" y="528.2" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#10263f"><tspan x="585.0" dy="0.0">Keep the binary</tspan><tspan x="585.0" dy="21.6">out of git</tspan></text><rect x="805" y="235" width="250" height="68" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="930.0" y="258.8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#10263f"><tspan x="930.0" dy="0.0">frozen_checkpoints/</tspan><tspan x="930.0" dy="20.4">candidates/my_unet_v1</tspan></text><rect x="805" y="325" width="250" height="68" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="930.0" y="359.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#10263f"><tspan x="930.0" dy="0.0">model_registry.local.json</tspan></text><rect x="805" y="415" width="250" height="68" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="930.0" y="438.2" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#10263f"><tspan x="930.0" dy="0.0">validate-registry</tspan><tspan x="930.0" dy="21.6">--strict</tspan></text><rect x="805" y="505" width="250" height="68" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="930.0" y="528.8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#10263f"><tspan x="930.0" dy="0.0">microseg-cli models</tspan><tspan x="930.0" dy="20.4">--details</tspan></text><rect x="1140" y="235" width="270" height="68" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="1275.0" y="269.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="600" fill="#10263f"><tspan x="1275.0" dy="0.0">Select model in GUI</tspan></text><rect x="1140" y="325" width="270" height="68" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="1275.0" y="348.8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#10263f"><tspan x="1275.0" dy="0.0">Load image and run</tspan><tspan x="1275.0" dy="20.4">CLI smoke test</tspan></text><rect x="1140" y="415" width="270" height="68" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="1275.0" y="438.8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#10263f"><tspan x="1275.0" dy="0.0">Inspect prediction,</tspan><tspan x="1275.0" dy="20.4">overlay, and metrics</tspan></text><rect x="1140" y="505" width="270" height="68" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="1275.0" y="528.8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#10263f"><tspan x="1275.0" dy="0.0">Promote only after</tspan><tspan x="1275.0" dy="20.4">review passes</tspan></text><line x1="385" y1="269" x2="445" y2="269" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="385" y1="359" x2="445" y2="359" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="385" y1="449" x2="445" y2="449" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="385" y1="539" x2="445" y2="539" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="720" y1="269" x2="780" y2="269" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="720" y1="359" x2="780" y2="359" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="720" y1="449" x2="780" y2="449" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="720" y1="539" x2="780" y2="539" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="1055" y1="269" x2="1115" y2="269" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="1055" y1="359" x2="1115" y2="359" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="1055" y1="449" x2="1115" y2="449" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="1055" y1="539" x2="1115" y2="539" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><rect x="540" y="628" width="520" height="42" rx="16" ry="16" fill="#ffffff" stroke="#d8dfe8" stroke-width="2"/><text x="800.0" y="649.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#10263f"><tspan x="800.0" dy="0.0">Use repo-relative paths everywhere. The registry overlay is the only file the GUI needs to discover local-only models.</tspan></text></svg>