<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1600 740" role="img" aria-label="Troubleshooting Map"><defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 12 6 L 0 12 z" fill="#5a7388"/></marker></defs><rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/><text x="800.0" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#10263f">Troubleshooting Map</text><text x="800.0" y="60" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b6075">Start from the symptom, then check the likely cause and the first fix to try.</text><rect x="60" y="92" width="1480" height="600" rx="22" ry="22" fill="#f8fbff" stroke="#a9bfd4" stroke-width="2"/><text x="84" y="126" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#10263f">Common failure paths</text><rect x="110" y="150" width="300" height="58" rx="16" ry="16" fill="#f6ecd7" stroke="#5b7a99" stroke-width="2"/><text x="260.0" y="179.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#10263f"><tspan x="260.0" dy="0.0">Symptom</tspan></text><rect x="650" y="150" width="300" height="58" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="800.0" y="179.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#10263f"><tspan x="800.0" dy="0.0">Likely cause</tspan></text><rect x="1150" y="150" width="300" height="58" rx="16" ry="16" fill="#eaf6ea" stroke="#5b7a99" stroke-width="2"/><text x="1300.0" y="179.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#10263f"><tspan x="1300.0" dy="0.0">First fix</tspan></text><rect x="110" y="230" width="300" height="74" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="260.0" y="267.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#10263f"><tspan x="260.0" dy="0.0">Model missing in the GUI</tspan></text><rect x="650" y="230" width="430" height="74" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="865.0" y="257.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#10263f"><tspan x="865.0" dy="0.0">Registry overlay is absent,</tspan><tspan x="865.0" dy="19.2">invalid, or the app was not restarted.</tspan></text><rect x="1150" y="230" width="330" height="74" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="1315.0" y="257.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#10263f"><tspan x="1315.0" dy="0.0">Run `microseg-cli models --details`,</tspan><tspan x="1315.0" dy="19.2">then restart the GUI after fixing the JSON.</tspan></text><line x1="410" y1="267" x2="650" y2="267" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="1080" y1="267" x2="1150" y2="267" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><rect x="110" y="332" width="300" height="74" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="260.0" y="369.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#10263f"><tspan x="260.0" dy="0.0">Validator reports unsupported architecture</tspan></text><rect x="650" y="332" width="430" height="74" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="865.0" y="359.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#10263f"><tspan x="865.0" dy="0.0">`model_type` does not match</tspan><tspan x="865.0" dy="19.2">a loader token such as `unet_binary`.</tspan></text><rect x="1150" y="332" width="330" height="74" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="1315.0" y="359.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#10263f"><tspan x="1315.0" dy="0.0">Change the registry entry to a supported</tspan><tspan x="1315.0" dy="19.2">token from `trained_model_loader.py`.</tspan></text><line x1="410" y1="369" x2="650" y2="369" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="1080" y1="369" x2="1150" y2="369" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><rect x="110" y="434" width="300" height="74" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="260.0" y="471.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#10263f"><tspan x="260.0" dy="0.0">CLI works but GUI still looks wrong</tspan></text><rect x="650" y="434" width="430" height="74" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="865.0" y="461.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#10263f"><tspan x="865.0" dy="0.0">Wrong model label, stale build,</tspan><tspan x="865.0" dy="19.2">or preprocessing/class mapping mismatch.</tspan></text><rect x="1150" y="434" width="330" height="74" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="1315.0" y="461.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#10263f"><tspan x="1315.0" dy="0.0">Smoke-test the exact display name in CLI,</tspan><tspan x="1315.0" dy="19.2">then compare the checkpoint and class map.</tspan></text><line x1="410" y1="471" x2="650" y2="471" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="1080" y1="471" x2="1150" y2="471" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><rect x="110" y="536" width="300" height="74" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="260.0" y="573.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#10263f"><tspan x="260.0" dy="0.0">Prediction is all background or nonsense</tspan></text><rect x="650" y="536" width="430" height="74" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="865.0" y="563.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#10263f"><tspan x="865.0" dy="0.0">The checkpoint was trained for a different</tspan><tspan x="865.0" dy="19.2">modality or label order.</tspan></text><rect x="1150" y="536" width="330" height="74" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="1315.0" y="563.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#10263f"><tspan x="1315.0" dy="0.0">Confirm `classes`, input normalization,</tspan><tspan x="1315.0" dy="19.2">and image modality before promotion.</tspan></text><line x1="410" y1="573" x2="650" y2="573" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="1080" y1="573" x2="1150" y2="573" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><rect x="220" y="646" width="1160" height="42" rx="16" ry="16" fill="#f8fbff" stroke="#a9bfd4" stroke-width="2"/><text x="800.0" y="667.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500" fill="#10263f"><tspan x="800.0" dy="0.0">When in doubt: verify the registry, run the CLI smoke test, then open the GUI.</tspan></text></svg>