-width="2"/><text x="375.0" y="392.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" fill="#10263f"><tspan x="375.0" dy="0.0">Export Corrected</tspan></text><rect x="470" y="370" width="160" height="44" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="550.0" y="392.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" fill="#10263f"><tspan x="550.0" dy="0.0">Save / Load</tspan></text><rect x="130" y="440" width="570" height="72" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="415.0" y="476.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" fill="#10263f"><tspan x="415.0" dy="0.0">Advanced report options, metrics, and session buttons all stacked into one narrow rail</tspan></text><rect x="885" y="208" width="570" height="52" rx="16" ry="16" fill="#ffffff" stroke="#b8d8b8" stroke-width="2"/><text x="1170.0" y="234.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="500" fill="#10263f"><tspan x="1170.0" dy="0.0">Grouped into readable cards with two-column actions and more air</tspan></text><rect x="900" y="282" width="540" height="108" rx="22" ry="22" fill="#f8fbff" stroke="#a9bfd4" stroke-width="2"/><text x="924" y="316" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#10263f">Quick start</text><rect x="930" y="326" width="210" height="36" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="1035.0" y="344.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" fill="#10263f"><tspan x="1035.0" dy="0.0">Image path + Load</tspan></text><rect x="1150" y="326" width="230" height="36" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="1265.0" y="344.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"