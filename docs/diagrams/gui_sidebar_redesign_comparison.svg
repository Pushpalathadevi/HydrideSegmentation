<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1600 720" role="img" aria-label="GUI Sidebar Redesign"><defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 12 6 L 0 12 z" fill="#5a7388"/></marker></defs><rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/><text x="800.0" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#10263f">GUI Sidebar Redesign</text><text x="800.0" y="60" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b6075">Left: the earlier cramped control rail. Right: the grouped layout with clearer spacing and hierarchy.</text><rect x="60" y="92" width="1480" height="620" rx="22" ry="22" fill="#f8fbff" stroke="#a9bfd4" stroke-width="2"/><text x="84" y="126" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#10263f">Before vs after</text><rect x="95" y="150" width="650" height="500" rx="22" ry="22" fill="#fff7f2" stroke="#d69b7a" stroke-width="2"/><text x="119" y="184" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#10263f">Before</text><rect x="855" y="150" width="650" height="500" rx="22" ry="22" fill="#f3faf3" stroke="#7ca67c" stroke-width="2"/><text x="879" y="184" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#10263f">After</text><rect x="125" y="208" width="570" height="52" rx="16" ry="16" fill="#ffffff" stroke="#e0b89f" stroke-width="2"/><text x="410.0" y="234.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="500" fill="#10263f"><tspan x="410.0" dy="0.0">Tiny single-row controls, long labels clipped, many competing actions</tspan></text><rect x="130" y="300" width="86" height="44" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="173.0" y="322.0" text-anchor="middle" font-fam