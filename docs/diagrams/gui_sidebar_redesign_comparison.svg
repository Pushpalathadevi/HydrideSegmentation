lvetica, sans-serif" font-size="14" font-weight="600" fill="#10263f"><tspan x="1180.0" dy="0.0">Save</tspan></text><rect x="1270" y="564" width="140" height="30" rx="16" ry="16" fill="#eaf6ea" stroke="#5b7a99" stroke-width="2"/><text x="1340.0" y="579.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="600" fill="#10263f"><tspan x="1340.0" dy="0.0">Load</tspan></text></svg>