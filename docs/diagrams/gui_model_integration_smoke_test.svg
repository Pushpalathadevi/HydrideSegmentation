<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1600 700" role="img" aria-label="Model Smoke Test"><defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 12 6 L 0 12 z" fill="#5a7388"/></marker></defs><rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/><text x="800.0" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#10263f">Model Smoke Test</text><text x="800.0" y="60" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b6075">CLI first, then GUI. The CLI proves the checkpoint loads; the GUI proves the workflow wiring.</text><rect x="60" y="92" width="1480" height="560" rx="22" ry="22" fill="#f8fbff" stroke="#a9bfd4" stroke-width="2"/><text x="84" y="126" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#10263f">Verification sequence</text><rect x="110" y="200" width="200" height="112" rx="16" ry="16" fill="#f6ecd7" stroke="#5b7a99" stroke-width="2"/><text x="210.0" y="242.8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#10263f"><tspan x="210.0" dy="0.0">1</tspan><tspan x="210.0" dy="26.4">Add registry entry</tspan></text><rect x="370" y="200" width="200" height="112" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="470.0" y="242.8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#10263f"><tspan x="470.0" dy="0.0">2</tspan><tspan x="470.0" dy="26.4">Check discovery</tspan></text><rect x="630" y="200" width="200" height="112" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="730.0" y="242.8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#10263f"><tspan x="730.0" dy="0.0">3</tspan><tspan x="730.0" dy="26.4">Run CLI inference</tspan></text><rect x="890" y="200" width="200" height="112" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="990.0" y="242.8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#10263f"><tspan x="990.0" dy="0.0">4</tspan><tspan x="990.0" dy="26.4">Inspect output folder</tspan></text><rect x="1150" y="200" width="200" height="112" rx="16" ry="16" fill="#eaf6ea" stroke="#5b7a99" stroke-width="2"/><text x="1250.0" y="242.8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#10263f"><tspan x="1250.0" dy="0.0">5</tspan><tspan x="1250.0" dy="26.4">Open GUI and rerun</tspan></text><line x1="310" y1="256" x2="370" y2="256" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="570" y1="256" x2="630" y2="256" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="830" y1="256" x2="890" y2="256" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="1090" y1="256" x2="1150" y2="256" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><rect x="120" y="380" width="360" height="72" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="300.0" y="405.2" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#10263f"><tspan x="300.0" dy="0.0">Use the exact GUI display name</tspan><tspan x="300.0" dy="21.6">from `microseg-cli models --details`.</tspan></text><rect x="500" y="380" width="360" height="72" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="680.0" y="405.8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#10263f"><tspan x="680.0" dy="0.0">Expected run artifacts:</tspan><tspan x="680.0" dy="20.4">input.png, prediction.png, overlay.png</tspan></text><rect x="880" y="380" width="360" height="72" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="1060.0" y="405.8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#10263f"><tspan x="1060.0" dy="0.0">Success means the mask loads back</tspan><tspan x="1060.0" dy="20.4">into the desktop window.</tspan></text><rect x="1260" y="380" width="220" height="72" rx="16" ry="16" fill="#ffffff" stroke="#5b7a99" stroke-width="2"/><text x="1370.0" y="405.2" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#10263f"><tspan x="1370.0" dy="0.0">If it fails,</tspan><tspan x="1370.0" dy="21.6">check the registry.</tspan></text><rect x="160" y="500" width="320" height="44" rx="16" ry="16" fill="#eaf6ea" stroke="#5d8d5d" stroke-width="2"/><text x="320.0" y="522.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#10263f"><tspan x="320.0" dy="0.0">CLI proof</tspan></text><rect x="540" y="500" width="320" height="44" rx="16" ry="16" fill="#eaf6ea" stroke="#5d8d5d" stroke-width="2"/><text x="700.0" y="522.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#10263f"><tspan x="700.0" dy="0.0">Artifact proof</tspan></text><rect x="920" y="500" width="320" height="44" rx="16" ry="16" fill="#eaf6ea" stroke="#5d8d5d" stroke-width="2"/><text x="1080.0" y="522.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#10263f"><tspan x="1080.0" dy="0.0">GUI proof</tspan></text><rect x="1300" y="500" width="160" height="44" rx="16" ry="16" fill="#f6ecd7" stroke="#b28b3e" stroke-width="2"/><text x="1380.0" y="522.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#10263f"><tspan x="1380.0" dy="0.0">Troubleshoot</tspan></text></svg>