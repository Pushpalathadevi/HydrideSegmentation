<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1600 760" role="img" aria-label="Which Model Should I Use?"><defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M 0 0 L 12 6 L 0 12 z" fill="#5a7388"/></marker></defs><rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/><text x="800.0" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#10263f">Which Model Should I Use?</text><text x="800.0" y="60" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b6075">Start with the simplest model that can reasonably solve the problem.</text><rect x="70" y="92" width="1460" height="620" rx="22" ry="22" fill="#f8fbff" stroke="#a9bfd4" stroke-width="2"/><text x="94" y="126" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#10263f">Selection tree</text><polygon points="702,140 898,140 960,202 800,268 640,202" fill="#f6ecd7" stroke="#b28b3e" stroke-width="2"/><text x="800.0" y="193.2" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#10263f"><tspan x="800.0" dy="0.0">Need a quick</tspan><tspan x="800.0" dy="21.6">baseline?</tspan></text><rect x="140" y="320" width="430" height="68" rx="16" ry="16" fill="#e8f0fb" stroke="#5b7a99" stroke-width="2"/><text x="355.0" y="354.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="600" fill="#10263f"><tspan x="355.0" dy="0.0">Use conventional segmentation</tspan></text><rect x="1030" y="320" width="430" height="68" rx="16" ry="16" fill="#f7efd8" stroke="#5b7a99" stroke-width="2"/><text x="1245.0" y="354.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="600" fill="#10263f"><tspan x="1245.0" dy="0.0">Need a trainable model?</tspan></text><line x1="640" y1="204" x2="570" y2="354" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="960" y1="204" x2="1030" y2="354" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><rect x="960" y="410" width="500" height="56" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="1210.0" y="438.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#10263f"><tspan x="1210.0" dy="0.0">Dataset small or medium?</tspan></text><rect x="960" y="492" width="500" height="56" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="1210.0" y="520.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#10263f"><tspan x="1210.0" dy="0.0">Prefer unet_binary or smp_unet_resnet18</tspan></text><rect x="960" y="574" width="500" height="56" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="1210.0" y="602.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#10263f"><tspan x="1210.0" dy="0.0">Need more global context?</tspan></text><rect x="960" y="656" width="500" height="56" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="1210.0" y="684.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#10263f"><tspan x="1210.0" dy="0.0">Try hf_segformer_b0 or hf_segformer_b2</tspan></text><rect x="140" y="410" width="430" height="56" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="355.0" y="438.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#10263f"><tspan x="355.0" dy="0.0">Use the conventional baseline first</tspan></text><line x1="1220" y1="388" x2="1220" y2="410" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="1220" y1="466" x2="1220" y2="492" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="1220" y1="548" x2="1220" y2="574" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><line x1="1220" y1="630" x2="1220" y2="656" stroke="#5a7388" stroke-width="3" marker-end="url(#arrow)"/><rect x="140" y="520" width="430" height="58" rx="16" ry="16" fill="#ffffff" stroke="#d8dfe8" stroke-width="2"/><text x="355.0" y="549.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#10263f"><tspan x="355.0" dy="0.0">If not, keep the baseline and document why.</tspan></text><rect x="540" y="520" width="300" height="58" rx="16" ry="16" fill="#eef5fb" stroke="#5b7a99" stroke-width="2"/><text x="690.0" y="549.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#10263f"><tspan x="690.0" dy="0.0">Use the compact transformer first</tspan></text></svg>