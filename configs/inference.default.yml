image_path: test_data/3PB_SRT_data_generation_1817_OD_side1_8.png
model_name: Hydride ML (UNet)
output_dir: outputs/inference
include_analysis: true
enable_gpu: false
device_policy: cpu
capture_feedback: true
feedback_root: outputs/feedback_records
deployment_id: cli_infer_local
operator_id: unknown_operator
gui_preprocess:
  enabled: true
  target_long_side: 512
  auto_contrast_enabled: true
  contrast_mode: histogram_stretch
  crop: false
  crop_percent: 0
result_export:
  compute_required_metrics: true
  compute_extended_metrics: false
  write_orientation_map: true
  write_distribution_charts: false
  write_physical_calibration_metrics: false
params:
  clahe:
    clip_limit: 2.0
    tile_grid_size: [8, 8]
  adaptive:
    block_size: 13
    C: 40
  morph:
    kernel_size: [5, 5]
    iterations: 0
  area_threshold: 95
  crop: false
  crop_percent: 10
