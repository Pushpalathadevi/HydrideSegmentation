# GA-driven HPC bundle generation defaults

experiment_name: microseg_hpc_ga_sweep
dataset_dir: outputs/prepared_dataset
output_dir: outputs/hpc_ga_bundle

base_train_config: configs/train.default.yml
base_eval_config: configs/evaluate.default.yml
run_mode: train_eval
eval_split: val

architectures: unet_binary,torch_pixel
num_candidates: 8
population_size: 24
generations: 8
mutation_rate: 0.20
crossover_rate: 0.70
seed: 42

learning_rate_min: 0.0001
learning_rate_max: 0.01
batch_size_choices: 4,8,16,32
epochs_min: 8
epochs_max: 40
weight_decay_min: 0.000001
weight_decay_max: 0.001
max_samples_min: 50000
max_samples_max: 250000

enable_gpu: true
device_policy: auto

scheduler: slurm
queue: ""
account: ""
qos: ""
gpus_per_job: 1
cpus_per_task: 8
mem_gb: 32
time_limit: 08:00:00
job_prefix: microseg

python_executable: python
microseg_cli_path: scripts/microseg_cli.py

