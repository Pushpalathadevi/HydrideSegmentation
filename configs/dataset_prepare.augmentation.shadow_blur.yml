dataset_dir: data
output_dir: outputs/prepared_dataset_augmented
split_train_ratio: 0.8
split_val_ratio: 0.1
split_test_ratio: 0.1
split_seed: 42
split_id_width: 6
split_strategy: leakage_aware
leakage_group_mode: suffix_aware
mask_input_type: indexed
binary_mask_normalization: off
augmentation:
  enabled: true
  seed: 42
  stage: post_resize
  apply_splits:
    - train
  variants_per_sample: 2
  operations:
    - name: shadow
      probability: 0.9
      parameters:
        radius: 150
        sigma: 500
        intensity_range: [40, 50]
        count_range: [1, 3]
    - name: blur
      probability: 0.8
      parameters:
        sigma: 120
        kernel_size_range: [3, 9]
        min_center_distance_ratio: 0.4
        count_range: [1, 3]
  debug:
    enabled: false
    max_samples: 8
