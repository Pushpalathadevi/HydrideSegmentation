dataset_dir: outputs/packaged_dataset
model_path: outputs/training/torch_pixel_classifier.pt
split: val
auto_prepare_dataset: true
prepare_output_dir: outputs/evaluation/prepared_dataset
split_train_ratio: 0.8
split_val_ratio: 0.1
split_test_ratio: 0.1
split_seed: 42
split_id_width: 6
split_strategy: leakage_aware
leakage_group_mode: suffix_aware
leakage_group_regex: ""
mask_input_type: indexed
mask_colormap: {}
mask_colormap_strict: true
output_path: outputs/evaluation/pixel_eval_report.json
write_html_report: true
tracking_samples: 8
tracking_seed: 17
enable_gpu: false
device_policy: cpu
