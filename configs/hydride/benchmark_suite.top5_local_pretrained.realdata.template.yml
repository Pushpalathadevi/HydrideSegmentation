# Copy this file and edit only the marked fields for a real-data run.
# Requires local pretrained bundles + registry at pre_trained_weights/.

dataset_dir: /path/to/real_dataset_root
output_root: /path/to/hpc_outputs/top5_suite_local_pretrained

eval_config: configs/hydride/evaluate.hydride.yml
eval_split: test
python_executable: python

# Start with one seed for first HPC validation run; expand to [42, 43, 44] for full study.
seeds: [42]
command_idle_timeout_seconds: 10800
command_wall_timeout_seconds: 10800

# Recommended true for reproducibility checks.
# If dataset_manifest.json is missing, it is auto-generated from train/val/test folders.
benchmark_mode: true

experiments:
  - name: unet_binary_local_pretrained
    train_config: configs/hydride/train.unet_binary_local_pretrained.yml
  - name: smp_deeplabv3plus_resnet101_local_pretrained
    train_config: configs/hydride/train.smp_deeplabv3plus_resnet101_local_pretrained.yml
  - name: smp_unetplusplus_resnet101_local_pretrained
    train_config: configs/hydride/train.smp_unetplusplus_resnet101_local_pretrained.yml
  - name: smp_pspnet_resnet101_local_pretrained
    train_config: configs/hydride/train.smp_pspnet_resnet101_local_pretrained.yml
  - name: smp_fpn_resnet101_local_pretrained
    train_config: configs/hydride/train.smp_fpn_resnet101_local_pretrained.yml
  - name: hf_segformer_b0_local_pretrained
    train_config: configs/hydride/train.hf_segformer_b0_local_pretrained.yml
  - name: hf_segformer_b2_local_pretrained
    train_config: configs/hydride/train.hf_segformer_b2_local_pretrained.yml
  - name: hf_upernet_swin_large_local_pretrained
    train_config: configs/hydride/train.hf_upernet_swin_large_local_pretrained.yml
  - name: transunet_tiny_local_pretrained
    train_config: configs/hydride/train.transunet_tiny_local_pretrained.yml
  - name: segformer_mini_local_pretrained
    train_config: configs/hydride/train.segformer_mini_local_pretrained.yml
