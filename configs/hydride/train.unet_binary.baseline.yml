dataset_dir: outputs/prepared_dataset_hydride_v1
output_dir: outputs/benchmarks/unet_binary_seed42
backend: unet_binary
backend_label: unet_binary
model_architecture: unet_binary
model_base_channels: 16
train_split: train
val_split: val
binary_mask_normalization: nonzero_foreground
auto_prepare_dataset: false
epochs: 20
batch_size: 8
learning_rate: 0.001
weight_decay: 0.00001
early_stopping_patience: 6
early_stopping_min_delta: 0.0001
checkpoint_every: 1
val_tracking_samples: 8
val_tracking_fixed_samples: []
val_tracking_seed: 17
write_html_report: true
progress_log_interval_pct: 10
seed: 42
enable_gpu: true
device_policy: auto

input_hw: [512, 512]
input_policy: random_crop
val_input_policy: letterbox
keep_aspect: true
pad_value_image: 0.0
pad_value_mask: 0
image_interpolation: bilinear
mask_interpolation: nearest
require_divisible_by: 32
dataloader_collate: default
